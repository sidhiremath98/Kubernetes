apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
    environment: dev
    component: web
    tier: frontend
    project: eksctl-cluster-development
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80 # The port that the service will listen on
      targetPort: 8080 # The port that the container is listening on