apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-config
  namespace: dev-namespace
  labels:
    app: configmap-app
    environment: dev
    project: eksctl-cluster-development
data:
  environment: Development
  database_url: jdbc:mysql://localhost:3306/mydb
  log_level: INFO
  log_format: json
  feature_flag: "true"
  max_connections: "100"
  timeout: "30s"
  allowed_hosts: "example.com,api.example.com"
  api_key: "12345-abcde-67890-fghij"
  welcome_message: "Welcome to the development environment!"  
  logging_level: "DEBUG"
  maintenance_mode: "false"
  supported_languages: "en,es,fr,de"
  retry_attempts: "5" 