apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  annotations:
    # Tell AWS to create an internal load balancer
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    # Specify SSL certificate ARN
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789:certificate/abc"
    # Use NLB instead of classic ELB
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  labels:
    app: nginx
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
  